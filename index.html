<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FieldLens — Bird ID</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --bg: #070e07;
  --surface: #0e180e;
  --surface2: #152015;
  --border: #1f301f;
  --border2: #2d452d;
  --text: #ddd5c4;
  --muted: #6b8060;
  --accent: #6db840;
  --amber: #d09c38;
  --danger: #d85050;
  --teal: #3db888;
  --mono: 'Space Mono', monospace;
  --serif: 'Playfair Display', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  overflow: hidden;
}

.screen {
  position: absolute; inset: 0;
  display: none; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
}
.screen.active { display: flex; }

/* ── SETUP SCREEN ── */
#screen-setup {
  justify-content: center; align-items: center;
  padding: 2rem 1.5rem; gap: 0;
}
.setup-logo {
  font-family: var(--serif); font-size: 2.2rem; font-weight: 500;
  color: var(--accent); letter-spacing: -0.5px;
  margin-bottom: 0.25rem;
}
.setup-sub {
  font-size: 10px; color: var(--muted); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 2.5rem;
}
.setup-card {
  width: 100%; max-width: 360px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;
}
.setup-label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.4rem;
}
.setup-input {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border2); border-radius: 6px;
  color: var(--text); font-family: var(--mono); font-size: 12px;
  padding: 0.7rem 0.9rem; outline: none;
  transition: border-color 0.2s;
}
.setup-input:focus { border-color: var(--accent); }
.setup-divider {
  height: 1px; background: var(--border);
  margin: 0.25rem 0;
}
.setup-hint {
  font-size: 10px; color: var(--muted); line-height: 1.6;
}
.setup-hint a { color: var(--accent); text-decoration: none; }
.btn-start {
  width: 100%; max-width: 360px; margin-top: 1.25rem;
  background: var(--accent); color: #050f05;
  border: none; border-radius: 8px;
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 0.9rem; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-start:active { transform: scale(0.98); opacity: 0.9; }
.version-tag {
  margin-top: 2rem; font-size: 9px; color: var(--border2);
  letter-spacing: 1px;
}

/* ── CAMERA SCREEN ── */
#screen-camera { background: #000; justify-content: space-between; }

.cam-topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.9rem 1rem;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}
.cam-gps {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 11px; font-family: var(--mono);
}
.gps-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted);
  transition: background 0.3s;
}
.gps-dot.acquiring { background: var(--amber); animation: pulse 1.2s infinite; }
.gps-dot.ready { background: var(--accent); animation: none; }
.gps-dot.error { background: var(--danger); }
.gps-text { color: rgba(255,255,255,0.8); }

.cam-settings-btn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%; width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: white; font-size: 15px;
}

#video {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
}

.cam-bottombar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem 1rem 2.5rem;
  background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
}
.cam-instructions {
  position: absolute; bottom: 7rem; left: 0; right: 0;
  text-align: center; font-size: 11px; color: rgba(255,255,255,0.6);
  letter-spacing: 0.5px;
}
.capture-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: transparent;
  border: 3px solid white;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: transform 0.1s;
}
.capture-btn:active { transform: scale(0.94); }
.capture-btn-inner {
  width: 56px; height: 56px; border-radius: 50%;
  background: white;
  transition: background 0.15s;
}
#canvas { display: none; }

/* ── VERIFY SCREEN ── */
#screen-verify { padding: 0; }

.verify-header {
  padding: 3rem 1.5rem 1.5rem;
  border-bottom: 1px solid var(--border);
}
.verify-title {
  font-family: var(--serif); font-size: 1.4rem; font-weight: 500;
  color: var(--text); margin-bottom: 0.3rem;
}
.verify-sub {
  font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase;
}

.verify-photo-strip {
  width: 100%; height: 140px; overflow: hidden; position: relative;
}
.verify-photo-strip img {
  width: 100%; height: 100%; object-fit: cover;
  filter: brightness(0.6);
}
.verify-photo-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, var(--bg) 0%, transparent 40%, var(--bg) 100%);
}

.verify-checks {
  padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0;
  flex: 1;
}
.check-item {
  display: flex; align-items: flex-start; gap: 0.9rem;
  padding: 0.85rem 0; border-bottom: 1px solid var(--border);
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.35s, transform 0.35s;
}
.check-item.visible { opacity: 1; transform: translateY(0); }
.check-icon {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; margin-top: 1px;
  transition: background 0.3s, border-color 0.3s;
}
.check-icon.ok { background: rgba(109,184,64,0.15); border-color: var(--accent); }
.check-icon.soon { background: rgba(208,156,56,0.1); border-color: var(--amber); }
